generic-service:
  nameOverride: hmpps-jobs-board-api
  productId: "DPS015" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-jobs-board-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-jobs-board-api-cert
    contextColour: green
    annotations:
      nginx.ingress.kubernetes.io/server-snippet: |
        server_tokens off;
        location /queue-admin/retry-all-dlqs {
          deny all;
          return 401;
        }

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: "logstash"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    # JAVA_TOOL_OPTIONS is set in the base image (hmpps-eclipse-temurin) with:
    #   -XX:MaxRAMPercentage=60.0
    # Uncomment below to override memory settings if needed.
    # Check resources.limits.memory is set appropriately.
    #
    # Percentage-based example:
    #   JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"
    #
    # Fixed memory example:
    #   JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"
    API_INTEGRATION_ENABLED: false

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-jobs-board-api:
      OS_PLACES_API_KEY: "OS_PLACES_API_KEY"
    hmpps-jobs-board-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
    rds-postgresql-instance-output:
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
      DATABASE_NAME: "database_name"
      DATABASE_ENDPOINT: "rds_instance_endpoint"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-jobs-board-api
