services:
  hmpps-jobs-board-api:
    build:
      context: .
    networks:
      - hmpps
    container_name: hmpps-jobs-board-api
    ports:
      - "8080:8080"
    depends_on:
      - job-board-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ping"]
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
      - PRODUCT_ID=DPS015
      - SPRING_DATASOURCE_URL=jdbc:postgresql://job-board-db:5432/job-board
      - API_BASE_URL_OAUTH=https://sign-in-dev.hmpps.service.justice.gov.uk/auth
      - HMPPS_SAR_ADDITIONALACCESSROLE=ROLE_EDUCATION_WORK_PLAN_VIEW
      - OS_PLACES_API_KEY=<OVERRIDE_THIS>

  job-board-db:
    image: postgres:16.2
    container_name: job-board-db
    networks:
      - hmpps
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=job-board
      - POSTGRES_USER=job-board
      - POSTGRES_DB=job-board
networks:
  hmpps:
